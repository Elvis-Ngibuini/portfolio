<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Portfolio Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px;
            backdrop-filter: blur(10px);
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { color: #00d4ff; font-size: 1.75rem; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; position: relative; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: #00d4ff; }
        .password-requirements { font-size: 0.85rem; color: #888; margin-top: 0.5rem; }
        .password-requirements ul { margin-left: 1.25rem; margin-top: 0.25rem; }
        .btn { 
            width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #00d4ff 0%, #7928ca 100%); 
            color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.3s;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
        .alert.error { background: rgba(239,68,68,0.2); display: block; color: #fca5a5; }
        .alert.success { background: rgba(16,185,129,0.2); display: block; color: #86efac; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .auth-footer a { color: #00d4ff; text-decoration: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-lock"></i> Set New Password</h1>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••••••" required minlength="12" autocomplete="new-password">
                <div class="password-requirements">
                    Minimum 12 characters required
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••••••" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Reset Password</span>
                <i id="btnSpinner" class="fas fa-spinner spinner"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001/api' : '/api';

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('alertBox').className = 'alert error';
            document.getElementById('alertBox').textContent = 'Invalid reset link. Please request a new password reset.';
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const alertBox = document.getElementById('alertBox');
            
            if (newPassword !== confirmPassword) {
                alertBox.className = 'alert error';
                alertBox.textContent = 'Passwords do not match';
                return;
            }
            
            btn.disabled = true;
            btnText.style.display = 'inline';
            spinner.style.display = 'inline-block';
            
            try {
                const res = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                
                if (data.success) {
                    alertBox.className = 'alert success';
                    alertBox.innerHTML = data.message + '<br><br><a href="login.html" style="color: #00d4ff;">Click here to sign in</a>';
                    document.getElementById('resetForm').style.display = 'none';
                } else {
                    alertBox.className = 'alert error';
                    alertBox.textContent = data.message;
                }
            } catch (err) {
                alertBox.className = 'alert error';
                alertBox.textContent = 'Connection error. Try again.';
            }
            
            btn.disabled = false;
            btnText.style.display = 'inline';
            spinner.style.display = 'none';
        });

        document.getElementById('newPassword').focus();
    </script>
</body>
</html>
