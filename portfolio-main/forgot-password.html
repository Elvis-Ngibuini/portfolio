<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Portfolio Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px;
            backdrop-filter: blur(10px);
        }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { color: #00d4ff; font-size: 1.75rem; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: #00d4ff; }
        .btn { 
            width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #00d4ff 0%, #7928ca 100%); 
            color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; 
            transition: opacity 0.3s;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
        .alert.error { background: rgba(239,68,68,0.2); display: block; color: #fca5a5; }
        .alert.success { background: rgba(16,185,129,0.2); display: block; color: #86efac; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .auth-footer a { color: #00d4ff; text-decoration: none; }
        .stepper { display: flex; justify-content: center; margin-bottom: 2rem; gap: 1rem; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .step-dot.active { background: #00d4ff; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="stepper">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>
        <div class="auth-header">
            <h1><i class="fas fa-key"></i> Reset Password</h1>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <div id="step1" style="display: block;">
            <p style="margin-bottom: 1rem; color: #888; font-size: 0.95rem;">Enter your admin email to receive a password reset link.</p>
            <form id="resetRequestForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn" id="submitBtn">
                    <span id="btnText">Send Reset Link</span>
                    <i id="btnSpinner" class="fas fa-spinner spinner"></i>
                </button>
            </form>
        </div>
        
        <div id="step2" style="display: none;">
            <div class="alert success" style="display: block;">
                <i class="fas fa-check-circle"></i> Reset link sent! Check your email.
            </div>
            <p style="margin: 1rem 0; color: #888; font-size: 0.95rem;">For development, click below:</p>
            <a id="resetLink" href="#" class="btn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); display: inline-block; text-decoration: none; text-align: center;">
                Reset Password (Dev Mode)
            </a>
        </div>
        
        <div class="auth-footer">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001/api' : '/api';

        document.getElementById('resetRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const email = document.getElementById('email').value;
            
            btn.disabled = true;
            btnText.style.display = 'inline';
            spinner.style.display = 'inline-block';
            
            try {
                const res = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                
                // In dev mode, show the reset link directly
                if (data.token) {
                    document.getElementById('resetLink').href = `reset-password.html?token=${data.token}`;
                }
            } catch (err) {
                document.getElementById('alertBox').className = 'alert error';
                document.getElementById('alertBox').textContent = 'Connection error. Try again.';
                btn.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }
        });

        document.getElementById('email').focus();
    </script>
</body>
</html>
