<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Portfolio Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px;
            backdrop-filter: blur(10px);
        }
        .auth-header h1 { color: #00d4ff; font-size: 1.75rem; margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff;
        }
        .btn { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #00d4ff 0%, #7928ca 100%); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
        .alert.success { background: rgba(16,185,129,0.2); display: block; }
        .auth-footer { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .auth-footer a { color: #00d4ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-key"></i> Reset Password</h1>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <div id="step1" style="display: block;">
            <form id="resetRequestForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
                <button type="submit" class="btn">Send Reset Link</button>
            </form>
        </div>
        
        <div id="step2" style="display: none;">
            <p style="margin-bottom: 1rem; color: #888;">Check your email and click the reset link. For development, use:</p>
            <div style="background: rgba(0,212,255,0.1); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                <a id="resetLink" href="#" style="color: #00d4ff; word-break: break-all;"></a>
            </div>
        </div>
        
        <div class="auth-footer">
            <a href="login.html">Back to Sign In</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001/api' : '/api';

        document.getElementById('resetRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            const res = await fetch(`${API_BASE}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await res.json();
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            
            // In dev mode, show the reset link directly
            if (data.token) {
                document.getElementById('resetLink').href = `reset-password.html?token=${data.token}`;
                document.getElementById('resetLink').textContent = 'Click here to reset password (dev mode)';
            }
        });
    </script>
</body>
</html>
